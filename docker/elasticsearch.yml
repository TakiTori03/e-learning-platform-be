services:
  # Elasticsearch Service for Catalog Search (Optimized for dev machine)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elearning-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    mem_limit: 1536m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elearning-network

  # Kibana Service for ES visualization (Optional - uncomment to use)
  # kibana:
  #   image: docker.elastic.co/kibana/kibana:8.11.1
  #   container_name: elearning-kibana
  #   ports:
  #     - "5601:5601"
  #   environment:
  #     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - elearning-network

volumes:
  elasticsearch_data:

networks:
  elearning-network:
    external: true
