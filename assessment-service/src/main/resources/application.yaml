server:
  port: 9006
  forward-headers-strategy: framework

spring:
  config:
    import: optional:classpath:common-observability.yml
  application:
    name: assessment-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/assessment_db?maxPoolSize=50&minPoolSize=10&maxIdleTimeMS=300000&waitQueueTimeoutMS=10000}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 100
          max-idle: 10
          min-idle: 5
      timeout: 1000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.hust-elearning.online/realms/elearning-realm}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/elearning-realm/protocol/openid-connect/certs}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: assessment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hust.commonlibrary.event"

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://discovery-service:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    com.hust.assessmentservice: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
