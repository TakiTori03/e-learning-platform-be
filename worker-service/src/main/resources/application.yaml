server:
  port: 9088
  forward-headers-strategy: framework

spring:
  application:
    name: worker-service

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:kafka:29092}
    consumer:
      group-id: worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Redis for Media Processing Status Coordination
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://discovery-service:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  frontend-url: ${FRONTEND_URL:https://e-learning-platform-web.vercel.app}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./uploads}
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}
  ffprobe:
    path: ${FFPROBE_PATH:ffprobe}
  minio:
    endpoint: ${MINIO_ENDPOINT:https://api.hust-elearning.online}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:elearning-media}
    region: ${MINIO_REGION:us-east-1}


logging:
  level:
    root: INFO
    com.hust.workerservice: DEBUG
    org.springframework.security: INFO
