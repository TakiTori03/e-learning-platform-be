version: '3.8'

services:
  # 1. MongoDB Shared for Course, Learning, Interaction, Media, Assessment, Notification
  elearning-mongodb:
    image: mongo:latest
    container_name: elearning-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 0.25
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elearning-network

  # 2. Shared PostgreSQL for Identity, Keycloak, Order, AI (with pgvector)
  elearning-postgres:
    image: pgvector/pgvector:pg15
    container_name: elearning-postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elearning-network

  # 3. Keycloak IAM Service
  elearning-keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: elearning-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://elearning-postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8443:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    deploy:
      resources:
        limits:
          memory: 600M
    depends_on:
      elearning-postgres:
        condition: service_healthy
    networks:
      - elearning-network

  # 4. Message Queue (Kafka KRaft)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: elearning-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    deploy:
      resources:
        limits:
          memory: 500M
    networks:
      - elearning-network

  # 5. Redis Cache
  redis-master:
    image: redis:7.0-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - elearning-network

  # 6. MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - elearning-network

  # 7. Elasticsearch Service (Optimized for dev machine)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elearning-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    mem_limit: 2g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elearning-network

volumes:
  mongodb_data:
  postgres_data:
  elasticsearch_data:

networks:
  elearning-network:
    name: elearning-network
    external: true

